name: Build native addon
description: Build the pi_natives cdylib for one platform/arch/variant and upload it as a hash-tagged artifact.

inputs:
   hash:
      description: Rust source hash used in the artifact name
      required: true
   platform:
      description: Target platform (linux, darwin, win32)
      required: true
   arch:
      description: Target arch (x64, arm64)
      required: true
   variant:
      description: Optional build variant (baseline, modern)
      required: false
      default: ""
   target:
      description: Optional rustc target triple for cross-compilation
      required: false
      default: ""
   rust_checks:
      description: Run clippy/rustfmt checks (only one matrix entry should set this)
      required: false
      default: "false"
   save_cache:
      description: Whether Swatinem/rust-cache should write a cache entry
      required: false
      default: "false"

runs:
   using: composite
   steps:
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2  # nightly
        with:
           toolchain: nightly-2026-04-29
           components: ${{ inputs.rust_checks == 'true' && 'clippy, rustfmt' || '' }}
           targets: ${{ inputs.target }}
      - name: Prepend rustup toolchain bin to PATH
        shell: bash
        run: |
           # Homebrew on macOS runners ships rustup-init with shadow proxies
           # for `cargo`/`rustc`/etc. that error out as the installer
           # ("unexpected argument 'metadata' found"). Force the real
           # toolchain binaries to win on PATH.
           toolchain_bin="$(dirname "$(rustup which cargo)")"
           echo "$toolchain_bin" >> "$GITHUB_PATH"
           echo "Prepended $toolchain_bin to PATH"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
           shared-key: native-${{ inputs.platform }}-${{ inputs.arch }}-${{ inputs.variant || 'default' }}
           cache-on-failure: true
           save-if: ${{ inputs.save_cache == 'true' }}
           cache-workspace-crates: true
      - uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e  # v2
        if: inputs.target == ''
        with:
           tool: nextest
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
           bun-version: "1.3"
      - shell: bash
        run: bun install --frozen-lockfile
      - name: Install cross-compilation toolchain
        if: inputs.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
           sudo apt-get update
           sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Rust checks
        if: inputs.rust_checks == 'true'
        shell: bash
        run: bun run check:rs
      - name: Test workspace (Rust)
        if: inputs.target == ''
        shell: bash
        run: bun run test:rs
      - name: Build native dist artifact and debug sidecar
        shell: bash
        env:
           CROSS_TARGET: ${{ inputs.target }}
           TARGET_PLATFORM: ${{ inputs.platform }}
           TARGET_ARCH: ${{ inputs.arch }}
           TARGET_VARIANTS: ${{ inputs.variant }}
           CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: PI_NATIVE_PROFILE=dist bun run ci:build:native
      - name: Build isolated native dist-symbols candidate
        shell: bash
        env:
           CROSS_TARGET: ${{ inputs.target }}
           TARGET_PLATFORM: ${{ inputs.platform }}
           TARGET_ARCH: ${{ inputs.arch }}
           TARGET_VARIANTS: ${{ inputs.variant }}
           PI_NATIVE_OUTPUT_DIR: artifacts/native-symbol-candidates
           CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: PI_NATIVE_PROFILE=dist-symbols bun run ci:build:native
      - name: Measure native footprint
        shell: bash
        run: bun scripts/measure-arch-review-footprint.ts --target ${{ inputs.platform }}-${{ inputs.arch }} ${{ inputs.variant && format('--variant {0}', inputs.variant) || '' }}
      - name: Measure native symbols
        shell: bash
        run: bun scripts/measure-native-symbols.ts --target ${{ inputs.platform }}-${{ inputs.arch }} --baseline-addon packages/natives/native/pi_natives.${{ inputs.platform }}-${{ inputs.arch }}${{ inputs.variant && format('-{0}', inputs.variant) || '' }}.node --candidate-addon artifacts/native-symbol-candidates/pi_natives.${{ inputs.platform }}-${{ inputs.arch }}${{ inputs.variant && format('-{0}', inputs.variant) || '' }}.node --profile dist-symbols --output artifacts/native-symbols-${{ inputs.platform }}-${{ inputs.arch }}-${{ github.sha }}.json
      - name: Upload immutable native symbol report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: native-symbols-${{ inputs.platform }}-${{ inputs.arch }}-pdist-symbols-s${{ github.sha }}
          path: artifacts/native-symbols-${{ inputs.platform }}-${{ inputs.arch }}-${{ github.sha }}.json
          if-no-files-found: error
          retention-days: 90
      - name: Upload native footprint
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
           name: arch-review-footprint-N1-${{ inputs.platform }}-${{ inputs.arch }}${{ inputs.variant && format('-{0}', inputs.variant) || '' }}
           path: artifacts/arch-review-footprint-N1-${{ inputs.platform }}-${{ inputs.arch }}.json
           if-no-files-found: error
      - name: Upload native addon(s)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
           name: pi-natives-${{ inputs.platform }}-${{ inputs.arch }}${{ inputs.variant && format('-{0}', inputs.variant) || '' }}-h${{ inputs.hash }}
           path: packages/natives/native/pi_natives*.${{ inputs.platform }}-${{ inputs.arch }}*.node
           if-no-files-found: error
           # Explicit so the rust-hash canary lookup keeps working even if org
           # defaults shift; bump if Rust source ever stays stable for >90 days
           # of main pushes and you want to avoid rebuilds.
           retention-days: 90
